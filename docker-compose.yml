services:
  server:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-egommerce}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:4200}
    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "4200:80"
    depends_on:
      - server
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
